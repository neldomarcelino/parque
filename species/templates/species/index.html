{% load static %}
<link rel="stylesheet" type="text/css" href="{% static 'species/style.css'%}">
{% if species %}
    <ul>
        {% for specie in species %}
            <li> <a href="{% url 'species:detail' specie.idespecie %}">{{specie.especie}}</a></li>
        {% endfor %}
    </ul>
{% else %}
    <h4> No species here </h4>
{% endif %}
